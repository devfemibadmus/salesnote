<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Salesnote - Add Items</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: 100dvh; }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 flex flex-col">
<header class="sticky top-0 z-30 bg-background-light/80 dark:bg-background-dark/80 ios-blur border-b border-slate-200/50 dark:border-slate-800/50 px-4 pt-4 pb-4">
<div class="flex items-center gap-3">
<button class="p-1 -ml-1 text-primary hover:bg-primary/10 rounded-full transition-colors">
<span class="material-symbols-outlined text-[28px]">chevron_left</span>
</button>
<h1 class="text-xl font-bold text-slate-900 dark:text-white">Add Items</h1>
</div>
</header>
<main class="flex-1 px-4 py-6 pb-48">
<div class="flex gap-2 mb-6">
<div class="h-1.5 flex-1 bg-primary rounded-full"></div>
<div class="h-1.5 flex-1 bg-primary rounded-full"></div>
<div class="h-1.5 flex-1 bg-slate-200 dark:bg-slate-800 rounded-full"></div>
</div>
<div class="space-y-4">
<div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700 relative overflow-hidden group">
<div class="flex justify-between items-start mb-2">
<div>
<h3 class="font-bold text-slate-900 dark:text-white">Premium Wireless Headphones</h3>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Electronics • Unit: $199.00</p>
</div>
<button class="text-slate-400 hover:text-red-500 transition-colors">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<div class="flex items-center justify-between mt-4">
<div class="flex items-center bg-slate-100 dark:bg-slate-900 rounded-lg p-1">
<button class="size-8 flex items-center justify-center text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 rounded shadow-sm transition-all">
<span class="material-symbols-outlined text-lg">remove</span>
</button>
<span class="px-4 text-sm font-bold w-10 text-center">1</span>
<button class="size-8 flex items-center justify-center text-slate-600 dark:text-slate-400 hover:bg-white dark:hover:bg-slate-800 rounded shadow-sm transition-all">
<span class="material-symbols-outlined text-lg">add</span>
</button>
</div>
<div class="text-right">
<p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Total</p>
<p class="text-lg font-bold text-primary">$199.00</p>
</div>
</div>
</div>
<div class="bg-white dark:bg-slate-800 p-4 rounded-2xl shadow-sm border border-slate-100 dark:border-slate-700">
<div class="flex justify-between items-start mb-2">
<div>
<h3 class="font-bold text-slate-900 dark:text-white">Leather Travel Bag</h3>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-1">Accessories • Unit: $125.00</p>
</div>
<button class="text-slate-400 hover:text-red-500">
<span class="material-symbols-outlined text-xl">delete</span>
</button>
</div>
<div class="flex items-center justify-between mt-4">
<div class="flex items-center bg-slate-100 dark:bg-slate-900 rounded-lg p-1">
<button class="size-8 flex items-center justify-center text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-lg">remove</span>
</button>
<span class="px-4 text-sm font-bold w-10 text-center">2</span>
<button class="size-8 flex items-center justify-center text-slate-600 dark:text-slate-400">
<span class="material-symbols-outlined text-lg">add</span>
</button>
</div>
<div class="text-right">
<p class="text-xs text-slate-500 uppercase font-bold tracking-wider">Total</p>
<p class="text-lg font-bold text-primary">$250.00</p>
</div>
</div>
</div>
<button class="w-full py-4 border-2 border-dashed border-slate-300 dark:border-slate-700 rounded-2xl flex flex-col items-center justify-center gap-2 text-slate-500 dark:text-slate-400 hover:bg-slate-50 dark:hover:bg-slate-800/50 transition-colors">
<div class="size-10 rounded-full bg-primary/10 flex items-center justify-center text-primary">
<span class="material-symbols-outlined">add</span>
</div>
<span class="text-sm font-semibold">Add Another Item</span>
</button>
</div>
</main>
<footer class="fixed bottom-0 left-0 right-0 bg-white/95 dark:bg-slate-900/95 ios-blur border-t border-slate-200 dark:border-slate-800 px-6 pt-6 pb-10 z-50">
<div class="flex items-center justify-between mb-6">
<div>
<p class="text-xs text-slate-500 font-bold uppercase tracking-widest">Sale Total</p>
<p class="text-3xl font-bold text-slate-900 dark:text-white">$449.00</p>
</div>
<div class="text-right">
<span class="inline-flex items-center px-2 py-1 rounded-md bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 text-[10px] font-bold uppercase">
                    3 Items
                </span>
</div>
</div>
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-xl shadow-lg shadow-primary/30 transition-all flex items-center justify-center gap-2 active:scale-[0.98]">
<span>Create Sale &amp; Receipt</span>
<span class="material-symbols-outlined text-xl">arrow_forward</span>
</button>
</footer>

</body></html>

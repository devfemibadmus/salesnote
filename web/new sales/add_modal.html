<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Salesnote - Add Item Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: 100dvh; }
        .ios-blur { backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 overflow-hidden">
<div class="fixed inset-0 z-0 opacity-40 grayscale-[20%]">
<header class="p-4 border-b border-slate-200/50 dark:border-slate-800/50">
<div class="flex items-center justify-between mb-4">
<h1 class="text-2xl font-bold">Sales</h1>
<span class="material-symbols-outlined">tune</span>
</div>
<div class="relative">
<div class="w-full bg-white dark:bg-slate-800 h-10 rounded-xl"></div>
</div>
</header>
<main class="px-4 py-4 space-y-4">
<div class="h-20 bg-white dark:bg-slate-800 rounded-xl shadow-sm"></div>
<div class="h-20 bg-white dark:bg-slate-800 rounded-xl shadow-sm"></div>
<div class="h-20 bg-white dark:bg-slate-800 rounded-xl shadow-sm"></div>
</main>
</div>
<div class="fixed inset-0 z-40 bg-slate-900/40 backdrop-blur-sm flex items-end sm:items-center justify-center">
<div class="w-full sm:max-w-md bg-white dark:bg-slate-900 rounded-t-3xl sm:rounded-3xl shadow-2xl transform transition-all animate-in slide-in-from-bottom duration-300">
<div class="flex justify-center pt-3 pb-1 sm:hidden">
<div class="w-10 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full"></div>
</div>
<div class="px-6 py-4 flex items-center justify-between border-b border-slate-100 dark:border-slate-800">
<h2 class="text-lg font-bold text-slate-900 dark:text-white">Add Item</h2>
<button class="p-1 rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500">
<span class="material-symbols-outlined text-xl">close</span>
</button>
</div>
<div class="p-6 space-y-6">
<div class="space-y-2">
<label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Item Name</label>
<div class="relative">
<input class="w-full bg-slate-50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700 rounded-xl px-4 py-3 text-sm focus:ring-primary focus:border-primary transition-all" placeholder="Search or enter name" type="text" value="Wireless Earbuds"/>
<div class="absolute right-3 top-1/2 -translate-y-1/2">
<span class="material-symbols-outlined text-slate-400">search</span>
</div>
</div>
<div class="flex flex-wrap gap-2 pt-1">
<span class="px-3 py-1 bg-blue-50 dark:bg-blue-900/30 text-primary text-[10px] font-semibold rounded-full border border-blue-100 dark:border-blue-800">Wireless Earbuds Pro</span>
<span class="px-3 py-1 bg-slate-100 dark:bg-slate-800 text-slate-600 dark:text-slate-400 text-[10px] font-semibold rounded-full border border-slate-200 dark:border-slate-700">Wireless Mouse</span>
</div>
</div>
<div class="grid grid-cols-2 gap-4">
<div class="space-y-2">
<label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Quantity</label>
<div class="flex items-center bg-slate-50 dark:bg-slate-800/50 border border-slate-200 dark:border-slate-700 rounded-xl p-1">
<button class="w-10 h-10 flex items-center justify-center text-slate-600 dark:text-slate-400 active:scale-95 transition-transform">
<span class="material-symbols-outlined font-bold">remove</span>
</button>
<input class="w-full bg-transparent border-none text-center font-bold text-slate-900 dark:text-white focus:ring-0 p-0" type="number" value="2"/>
<button class="w-10 h-10 flex items-center justify-center text-primary active:scale-95 transition-transform">
<span class="material-symbols-outlined font-bold">add</span>
</button>
</div>
</div>
<div class="space-y-2">
<label class="text-[11px] font-bold text-slate-500 uppercase tracking-wider ml-1">Unit Price</label>
<div class="relative">
<span class="absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 font-medium">$</span>
<input class="w-full bg-slate-50 dark:bg-slate-800/50 border-slate-200 dark:border-slate-700 rounded-xl pl-8 pr-4 py-3 text-sm font-bold text-slate-900 dark:text-white focus:ring-primary focus:border-primary" type="text" value="45.00"/>
</div>
</div>
</div>
<div class="bg-primary/5 dark:bg-primary/10 rounded-2xl p-4 border border-primary/10 flex items-center justify-between">
<div>
<p class="text-[10px] font-bold text-primary uppercase tracking-widest">Line Total</p>
<p class="text-xs text-slate-500 dark:text-slate-400 mt-0.5">2 units × $45.00</p>
</div>
<div class="text-right">
<p class="text-2xl font-bold text-primary">$90.00</p>
</div>
</div>
</div>
<div class="p-6 pt-2 pb-8 sm:pb-6">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold py-4 rounded-2xl shadow-lg shadow-primary/30 active:scale-[0.98] transition-all flex items-center justify-center gap-2">
<span class="material-symbols-outlined text-xl">add_shopping_cart</span>
                Add to Sale
            </button>
</div>
</div>
</div>
<nav class="fixed bottom-0 left-0 right-0 bg-white/50 dark:bg-slate-900/50 backdrop-blur-md border-t border-slate-200/50 dark:border-slate-800/50 px-6 py-3 pb-6 flex justify-between items-center z-10 opacity-30 grayscale pointer-events-none">
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px]">Home</span>
</div>
<div class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined fill-1">analytics</span>
<span class="text-[10px]">Sales</span>
</div>
<div class="relative -mt-10">
<div class="size-14 bg-primary text-white rounded-full flex items-center justify-center border-4 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-3xl">add</span>
</div>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined">inventory_2</span>
<span class="text-[10px]">Products</span>
</div>
<div class="flex flex-col items-center gap-1">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px]">Receipts</span>
</div>
</nav>

</body></html>

<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Onboarding - Smart Sales Analysis</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#007AFF",
                        "surface": "#F2F2F7",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        :root {
            --primary-color: #007AFF;
        }
        body {
            min-height: 100dvh;
            background-color: white;
        }
        .chart-bar {
            @apply bg-primary rounded-t-sm w-full transition-all duration-700;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="font-display antialiased">
<div class="relative flex h-screen w-full flex-col justify-between p-6 overflow-hidden">
<div class="flex-1 flex flex-col items-center justify-center space-y-8 pt-10">
<div class="relative w-full max-w-[280px] h-64 bg-slate-50 rounded-3xl p-6 shadow-sm border border-slate-100 flex flex-col justify-between overflow-hidden">
<div class="bg-white rounded-2xl p-4 shadow-lg border border-slate-50 absolute top-4 -right-4 w-40 z-10 animate-pulse">
<p class="text-[10px] text-slate-400 font-medium uppercase tracking-wider">Total Sales</p>
<p class="text-lg font-bold text-slate-900">₦450,200</p>
<div class="flex items-center text-green-500 gap-1 mt-1">
<span class="material-symbols-outlined text-sm">trending_up</span>
<span class="text-[10px] font-bold">+12.5%</span>
</div>
</div>
<div class="mt-auto h-32 flex items-end justify-between gap-2 w-full">
<div class="chart-bar h-[30%] opacity-20"></div>
<div class="chart-bar h-[45%] opacity-40"></div>
<div class="chart-bar h-[35%] opacity-30"></div>
<div class="chart-bar h-[65%] opacity-60"></div>
<div class="chart-bar h-[55%] opacity-50"></div>
<div class="chart-bar h-[85%] opacity-80"></div>
<div class="chart-bar h-[100%]"></div>
</div>
<div class="flex justify-between w-full pt-4 border-t border-slate-100">
<div class="w-4 h-1 bg-slate-200 rounded-full"></div>
<div class="w-4 h-1 bg-slate-200 rounded-full"></div>
<div class="w-4 h-1 bg-slate-200 rounded-full"></div>
<div class="w-4 h-1 bg-slate-200 rounded-full"></div>
<div class="w-4 h-1 bg-slate-200 rounded-full"></div>
</div>
</div>
<div class="flex gap-2">
<div class="h-1.5 w-1.5 rounded-full bg-slate-200"></div>
<div class="h-1.5 w-4 rounded-full bg-primary"></div>
<div class="h-1.5 w-1.5 rounded-full bg-slate-200"></div>
</div>
</div>
<div class="flex flex-col space-y-4 mb-12">
<h1 class="text-3xl font-bold text-slate-900 tracking-tight">
                Smart Sales Analysis
            </h1>
<p class="text-slate-500 text-lg leading-relaxed">
                Track your shop’s performance with simple daily, weekly, and monthly reports. Grow your business with data.
            </p>
</div>
<div class="flex items-center justify-between pb-4">
<button class="text-slate-400 font-semibold text-base px-2 py-2">
                Skip
            </button>
<button class="bg-primary text-white font-bold text-base px-8 py-4 rounded-2xl shadow-lg shadow-blue-200 active:scale-95 transition-transform">
                Get Started
            </button>
</div>
</div>

</body></html>

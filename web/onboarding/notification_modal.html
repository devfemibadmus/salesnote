<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Notification Permission Modal</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#137fec",
            "background-light": "#f6f7f8",
            "background-dark": "#101922",
          },
          fontFamily: {
            "display": ["Inter", "sans-serif"]
          },
          borderRadius: {
            "DEFAULT": "0.25rem",
            "lg": "0.5rem",
            "xl": "0.75rem",
            "full": "9999px"
          },
        },
      },
    }
  </script>
<style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 1, 'wght' 400, 'GRAD' 0, 'opsz' 48;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex items-center justify-center font-display">
<!-- Background Dimmer (Simulating a background screen for a mobile app) -->
<div class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm z-0"></div>
<!-- Modal Container -->
<div class="relative z-10 w-full max-w-[340px] mx-4 bg-white dark:bg-slate-900 rounded-xl shadow-2xl overflow-hidden flex flex-col items-center">
<!-- Top Padding & Icon Section -->
<div class="pt-8 pb-4 flex flex-col items-center">
<div class="w-16 h-16 rounded-full bg-primary/10 flex items-center justify-center mb-4">
<span class="material-symbols-outlined text-primary text-4xl" data-icon="notifications">
          notifications
        </span>
</div>
<!-- SectionHeader Equivalent -->
<h4 class="text-primary text-sm font-bold uppercase tracking-[0.1em] px-4 text-center">Stay Updated</h4>
</div>
<!-- BodyText Section -->
<div class="px-8 text-center">
<h2 class="text-slate-900 dark:text-white text-xl font-bold leading-tight mb-3">Enable Notifications</h2>
<p class="text-slate-600 dark:text-slate-400 text-sm font-normal leading-relaxed pb-6">
        Get daily insights on your shop's performance. We'll notify you how today's sales compare to yesterday and how your week is going.
      </p>
</div>
<!-- ButtonGroup Section -->
<div class="w-full px-6 pb-8">
<div class="flex flex-col gap-3">
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-12 px-5 bg-primary text-white text-base font-bold leading-normal tracking-[0.015em] w-full hover:bg-primary/90 transition-colors">
<span class="truncate">Allow Notifications</span>
</button>
<button class="flex min-w-[84px] cursor-pointer items-center justify-center overflow-hidden rounded-lg h-10 px-5 bg-transparent text-slate-500 dark:text-slate-400 text-sm font-semibold leading-normal tracking-[0.015em] w-full hover:text-slate-700 dark:hover:text-slate-200 transition-colors">
<span class="truncate">Not now</span>
</button>
</div>
</div>
<!-- Decorative Image/Illustration Element (Optional visual flair) -->
<div class="w-full h-1 bg-gradient-to-r from-transparent via-primary/20 to-transparent"></div>
</div>
<!-- Background Content Simulation (The app content "behind" the modal) -->
<div class="fixed inset-0 -z-10 flex flex-col p-4 pointer-events-none opacity-20">
<div class="flex items-center justify-between mb-8">
<div class="w-8 h-8 rounded-full bg-slate-300"></div>
<div class="h-4 w-32 bg-slate-300 rounded"></div>
<div class="w-8 h-8 rounded-full bg-slate-300"></div>
</div>
<div class="h-32 w-full bg-slate-200 rounded-lg mb-4"></div>
<div class="grid grid-cols-2 gap-4">
<div class="h-24 bg-slate-200 rounded-lg"></div>
<div class="h-24 bg-slate-200 rounded-lg"></div>
</div>
<div class="mt-6 h-48 bg-slate-200 rounded-lg"></div>
</div>
</body></html>

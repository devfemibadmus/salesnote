<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Sales History - Salesnote</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { min-height: 100dvh; }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen">
<header class="sticky top-0 z-20 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md">
<div class="flex items-center p-4 justify-between">
<div class="flex items-center gap-1">
<button class="p-2 -ml-2 rounded-full">
<span class="material-symbols-outlined text-slate-900 dark:text-white">chevron_left</span>
</button>
<h1 class="text-xl font-bold text-slate-900 dark:text-white">Sales History</h1>
</div>
<button class="p-2 rounded-full hover:bg-slate-200 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-slate-700 dark:text-slate-300">filter_list</span>
</button>
</div>
</header>
<main class="flex flex-col items-center justify-center px-8 text-center min-h-[calc(100vh-180px)]">
<div class="relative mb-8">
<div class="w-48 h-48 bg-primary/5 dark:bg-primary/10 rounded-full flex items-center justify-center">
<div class="relative">
<span class="material-symbols-outlined text-8xl text-primary/20 dark:text-primary/30">receipt_long</span>
<div class="absolute -bottom-2 -right-2 bg-white dark:bg-slate-800 p-3 rounded-2xl shadow-xl border border-slate-100 dark:border-slate-700">
<span class="material-symbols-outlined text-primary text-3xl">shopping_bag</span>
</div>
</div>
</div>
</div>
<h2 class="text-2xl font-bold text-slate-900 dark:text-white mb-3">No sales yet</h2>
<p class="text-slate-500 dark:text-slate-400 text-base max-w-[280px] leading-relaxed mb-8">
            Your completed sales will appear here. Start by adding a new sale.
        </p>
<button class="bg-primary hover:bg-primary/90 text-white font-bold py-4 px-10 rounded-2xl shadow-lg shadow-primary/30 transition-all active:scale-95 flex items-center gap-2">
<span class="material-symbols-outlined">add</span>
            Add Sale
        </button>
</main>
<nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-900/90 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-6 py-3 pb-6 flex justify-between items-center z-50">
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined">home</span>
<span class="text-[10px] font-medium">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined fill-1">analytics</span>
<span class="text-[10px] font-bold">Sales</span>
</button>
<div class="relative -mt-10">
<button class="size-14 bg-primary text-white rounded-full shadow-lg shadow-primary/40 flex items-center justify-center border-4 border-background-light dark:border-background-dark">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined">inventory_2</span>
<span class="text-[10px] font-medium">Products</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">
<span class="material-symbols-outlined">receipt_long</span>
<span class="text-[10px] font-medium">Receipts</span>
</button>
</nav>

</body></html>

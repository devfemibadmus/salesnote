<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Salesnote - Verify Code</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "system-ui", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
        }.otp-input {
            @apply w-full aspect-square text-center text-2xl font-bold rounded-2xl border border-[#cfdbe7] dark:border-slate-700 bg-white dark:bg-slate-800 focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#0d141b] dark:text-white">
<div class="relative flex min-h-screen w-full flex-col px-6">
<header class="flex items-center pt-12 pb-8">
<button class="flex items-center justify-center w-10 h-10 -ml-2 text-[#0d141b] dark:text-white">
<span class="material-symbols-outlined text-3xl">chevron_left</span>
</button>
</header>
<main class="flex-1 flex flex-col max-w-[400px] mx-auto w-full">
<div class="mb-8">
<h1 class="text-3xl font-black tracking-tight mb-3">Verify Code</h1>
<p class="text-[#4c739a] dark:text-slate-400 text-lg leading-relaxed">
                    Enter the 4-digit code sent to your phone or email.
                </p>
</div>
<div class="space-y-8">
<div class="flex gap-4 justify-between">
<input class="otp-input" inputmode="numeric" maxlength="1" pattern="\d*" placeholder="-" type="text"/>
<input class="otp-input" inputmode="numeric" maxlength="1" pattern="\d*" placeholder="-" type="text"/>
<input class="otp-input" inputmode="numeric" maxlength="1" pattern="\d*" placeholder="-" type="text"/>
<input class="otp-input" inputmode="numeric" maxlength="1" pattern="\d*" placeholder="-" type="text"/>
</div>
<div class="pt-2">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-16 rounded-2xl text-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
                        Verify
                    </button>
</div>
<div class="text-center">
<button class="text-primary font-semibold text-lg hover:underline underline-offset-4">
                        Resend code
                    </button>
</div>
</div>
</main>
<footer class="py-10 text-center">
<div class="w-32 h-1.5 bg-[#cfdbe7] dark:bg-slate-800 mx-auto rounded-full opacity-50"></div>
</footer>
</div>

</body></html>

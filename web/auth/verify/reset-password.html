<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Salesnote - Reset Password</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "system-ui", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
            min-height: 100dvh;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-[#0d141b] dark:text-white">
<div class="relative flex min-h-screen w-full flex-col px-6">
<header class="flex flex-col items-center justify-center pt-16 pb-8">
<h2 class="text-primary text-2xl font-black tracking-tight mb-2">Salesnote</h2>
<h1 class="text-xl font-bold text-[#0d141b] dark:text-white">Reset Password</h1>
</header>
<main class="flex-1 flex flex-col max-w-[400px] mx-auto w-full">
<div class="space-y-6">
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<span class="text-sm font-semibold mb-2 ml-1 text-[#4c739a] dark:text-slate-400">New Password</span>
<div class="relative group">
<input class="form-input w-full rounded-2xl border border-[#cfdbe7] dark:border-slate-700 bg-white dark:bg-slate-800 h-16 px-5 pr-14 text-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-[#94a3b8] placeholder:tracking-widest" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#4c739a] flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
</div>
<div class="flex flex-col w-full">
<label class="flex flex-col w-full">
<span class="text-sm font-semibold mb-2 ml-1 text-[#4c739a] dark:text-slate-400">Confirm New Password</span>
<div class="relative group">
<input class="form-input w-full rounded-2xl border border-[#cfdbe7] dark:border-slate-700 bg-white dark:bg-slate-800 h-16 px-5 pr-14 text-lg focus:ring-2 focus:ring-primary/20 focus:border-primary outline-none transition-all placeholder:text-[#94a3b8] placeholder:tracking-widest" placeholder="••••••••" type="password"/>
<button class="absolute right-4 top-1/2 -translate-y-1/2 text-[#4c739a] flex items-center justify-center" type="button">
<span class="material-symbols-outlined">visibility</span>
</button>
</div>
</label>
</div>
<div class="pt-4">
<button class="w-full bg-primary hover:bg-primary/90 text-white font-bold h-16 rounded-2xl text-xl shadow-lg shadow-primary/20 active:scale-[0.98] transition-all">
                        Reset password
                    </button>
</div>
<div class="pt-4 text-center">
<a class="text-[#4c739a] font-medium text-base hover:opacity-80 transition-opacity" href="#">
                        Back to sign in
                    </a>
</div>
</div>
</main>
<footer class="py-10 text-center">
<div class="w-12 h-1 bg-[#cfdbe7] dark:bg-slate-800 mx-auto rounded-full opacity-50"></div>
</footer>
</div>

</body></html>

<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Simple Create Account - Step 1</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100dvh;
        }
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-white dark:bg-background-dark flex flex-col font-display antialiased">
<header class="flex items-center justify-between px-4 py-3 bg-white dark:bg-background-dark/50 backdrop-blur-md sticky top-0 z-10">
<button aria-label="Go back" class="flex items-center justify-center w-10 h-10 rounded-full text-slate-900 dark:text-white hover:bg-slate-100 dark:hover:bg-slate-800 transition-colors">
<span class="material-symbols-outlined text-2xl">arrow_back_ios_new</span>
</button>
<h2 class="text-[#0d141b] dark:text-white text-lg font-bold leading-tight flex-1 text-center pr-10">Create Account</h2>
</header>
<main class="flex-1 flex flex-col px-6 pt-2 pb-10 max-w-md mx-auto w-full">
<div class="flex w-full flex-row items-center justify-center gap-3 py-8">
<div class="h-2 w-8 rounded-full bg-primary shadow-sm shadow-primary/20"></div>
<div class="h-2 w-2 rounded-full bg-slate-200 dark:bg-slate-700"></div>
<div class="h-2 w-2 rounded-full bg-slate-200 dark:bg-slate-700"></div>
</div>
<div class="pt-2 pb-6">
<h1 class="text-[#0d141b] dark:text-white tracking-tight text-[28px] font-bold leading-tight">
                What is your shop name?
            </h1>
</div>
<div class="flex-1">
<div class="flex flex-col gap-4">
<div class="flex flex-col gap-2">
<input autofocus="" class="form-input flex w-full rounded-2xl text-[#0d141b] dark:text-white border-slate-200 dark:border-slate-800 bg-slate-50 dark:bg-slate-900/50 h-16 px-5 text-xl font-medium placeholder:text-slate-400 focus:border-primary focus:ring-4 focus:ring-primary/10 transition-all outline-none" placeholder="Enter shop name" type="text"/>
</div>
</div>
</div>
<div class="mt-auto pt-8">
<button class="w-full bg-primary hover:bg-primary/90 active:scale-[0.98] text-white font-semibold text-lg h-14 rounded-2xl transition-all flex items-center justify-center">
                Next
            </button>
<p class="text-center text-slate-400 dark:text-slate-500 text-sm mt-6 font-medium">
                Step 1 of 3
            </p>
</div>
</main>
<div class="fixed inset-0 -z-10 pointer-events-none">
<div class="absolute top-0 left-0 w-full h-full bg-[radial-gradient(circle_at_top_right,rgba(19,127,236,0.03),transparent_70%)]"></div>
</div>

</body></html>

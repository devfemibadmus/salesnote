<!DOCTYPE html>
<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Inter', sans-serif;
            min-height: max(884px, 100dvh);
        }
        .ios-shadow {
            box-shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark min-h-screen flex justify-center items-start font-display">
<div class="w-full max-w-[430px] min-h-screen bg-white dark:bg-background-dark flex flex-col shadow-2xl relative overflow-hidden">
<div class="flex items-center bg-white dark:bg-background-dark p-4 pb-2 justify-between sticky top-0 z-10">
<div class="text-primary flex size-10 shrink-0 items-center justify-start cursor-pointer">
<span class="material-symbols-outlined text-3xl">chevron_left</span>
</div>
<h2 class="text-[#0d141b] dark:text-white text-lg font-bold leading-tight tracking-[-0.015em] flex-1 text-center pr-10">Final Step</h2>
</div>
<div class="flex w-full flex-row items-center justify-center gap-2 py-4">
<div class="h-1.5 w-1.5 rounded-full bg-[#cfdbe7] dark:bg-gray-700"></div>
<div class="h-1.5 w-1.5 rounded-full bg-[#cfdbe7] dark:bg-gray-700"></div>
<div class="h-1.5 w-6 rounded-full bg-primary"></div>
</div>
<div class="flex-1 px-6">
<h3 class="text-[#0d141b] dark:text-white tracking-tight text-2xl font-bold leading-tight pb-8 pt-4">Final Step</h3>
<div class="space-y-6">
<div class="flex flex-col">
<p class="text-[#0d141b] dark:text-white text-sm font-semibold leading-normal pb-2 px-1">Password</p>
<div class="flex w-full items-stretch rounded-xl overflow-hidden border border-[#cfdbe7] dark:border-gray-700 focus-within:ring-2 focus-within:ring-primary/20">
<input class="form-input flex w-full min-w-0 flex-1 resize-none border-0 bg-white dark:bg-gray-900 h-14 placeholder:text-[#94a3b8] p-[15px] pr-2 text-base font-normal leading-normal focus:ring-0" placeholder="Create a password" type="password"/>
<div class="text-[#4c739a] flex bg-white dark:bg-gray-900 items-center justify-center pr-[15px]">
<span class="material-symbols-outlined">visibility</span>
</div>
</div>
</div>
<div class="flex flex-col">
<p class="text-[#0d141b] dark:text-white text-sm font-semibold leading-normal pb-2 px-1">Shop Address (optional)</p>
<div class="flex w-full items-stretch rounded-xl overflow-hidden border border-[#cfdbe7] dark:border-gray-700 focus-within:ring-2 focus-within:ring-primary/20">
<textarea class="form-textarea flex w-full min-w-0 flex-1 resize-none border-0 bg-white dark:bg-gray-900 h-32 placeholder:text-[#94a3b8] p-[15px] text-base font-normal leading-normal focus:ring-0" placeholder="e.g. Shop 12, Lagos Island Market"></textarea>
</div>
</div>
</div>
</div>
<div class="p-6 pb-12 space-y-4">
<button class="w-full h-16 bg-primary hover:bg-primary/90 text-white font-bold text-lg rounded-2xl transition-all shadow-lg shadow-primary/20 flex items-center justify-center gap-2">
                Create shop
                <span class="material-symbols-outlined">arrow_forward</span>
</button>
<p class="text-[10px] text-center text-[#94a3b8] px-8 leading-relaxed">
                By creating your shop, you agree to our Merchant Terms of Service and Privacy Policy.
            </p>
</div>
<div class="flex justify-center pb-2">
<div class="w-32 h-1 bg-gray-200 dark:bg-gray-800 rounded-full"></div>
</div>
</div>

</body></html>

<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Dashboard Loading State - Salesnote</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#137fec",
                        "background-light": "#f6f7f8",
                        "background-dark": "#101922",
                    },
                    fontFamily: {
                        "display": ["Inter"]
                    },
                    borderRadius: {"DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px"},
                },
            },
        }
    </script>
<style>
        .skeleton-shimmer {
            background: linear-gradient(
                90deg,
                rgba(229, 231, 235, 1) 25%,
                rgba(243, 244, 246, 1) 50%,
                rgba(229, 231, 235, 1) 75%
            );
            background-size: 200% 100%;
            animation: shimmer 1.5s infinite;
        }

        .dark .skeleton-shimmer {
            background: linear-gradient(
                90deg,
                rgba(31, 41, 55, 1) 25%,
                rgba(55, 65, 81, 1) 50%,
                rgba(31, 41, 55, 1) 75%
            );
            background-size: 200% 100%;
        }

        @keyframes shimmer {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 antialiased">
<!-- iOS Status Bar Placeholder -->
<div class="h-12 w-full flex items-center justify-between px-6 pt-4">
<div class="text-sm font-bold">9:41</div>
<div class="flex gap-1.5 items-center">
<span class="material-symbols-outlined text-[18px]">signal_cellular_4_bar</span>
<span class="material-symbols-outlined text-[18px]">wifi</span>
<span class="material-symbols-outlined text-[18px]">battery_full</span>
</div>
</div>
<!-- Top AppBar -->
<div class="flex items-center p-4 justify-between sticky top-0 bg-background-light/80 dark:bg-background-dark/80 backdrop-blur-md z-10">
<div class="flex items-center gap-3">
<div class="size-10 rounded-full flex items-center justify-center bg-primary/10 text-primary">
<span class="material-symbols-outlined">menu</span>
</div>
<h1 class="text-xl font-bold tracking-tight">Dashboard</h1>
</div>
<div class="flex items-center gap-2">
<button class="size-10 rounded-full flex items-center justify-center bg-slate-200 dark:bg-slate-800">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400">notifications</span>
</button>
<div class="size-10 rounded-full skeleton-shimmer border-2 border-white dark:border-slate-800"></div>
</div>
</div>
<main class="px-4 pb-24">
<!-- Shop Header Skeleton -->
<div class="mt-4 p-4 rounded-xl bg-white dark:bg-slate-900 shadow-sm border border-slate-200 dark:border-slate-800">

<div class="size-16 rounded-lg skeleton-shimmer"></div>
<div class="flex-1 space-y-2">
<div class="h-5 w-3/4 rounded skeleton-shimmer"></div>
<div class="h-4 w-1/2 rounded skeleton-shimmer"></div>
</div>
</div>
</div>
<!-- KPI Cards Row -->
<div class="mt-6 flex gap-3 overflow-x-hidden">
<div class="min-w-[140px] flex-1 p-4 rounded-xl bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 space-y-3">
<div class="h-3 w-12 rounded-full bg-primary/20"></div>
<div class="h-6 w-20 rounded skeleton-shimmer"></div>
<div class="h-3 w-16 rounded skeleton-shimmer"></div>
</div>

<div class="h-6 w-16 rounded skeleton-shimmer"></div>
<div class="h-3 w-10 rounded skeleton-shimmer"></div>
</div>

<div class="h-3 w-12 rounded-full bg-slate-100 dark:bg-slate-800"></div>
<div class="h-6 w-14 rounded skeleton-shimmer"></div>
<div class="h-3 w-20 rounded skeleton-shimmer"></div>
</div>

<div class="w-full h-28 rounded-t-sm skeleton-shimmer opacity-80"></div>
<div class="w-full h-36 rounded-t-sm skeleton-shimmer opacity-50"></div>
<div class="w-full h-20 rounded-t-sm skeleton-shimmer opacity-70"></div>
<div class="w-full h-24 rounded-t-sm skeleton-shimmer opacity-40"></div>
</div>
<div class="flex justify-between mt-4 px-2">
<div class="h-2 w-6 rounded skeleton-shimmer"></div>
<div class="h-2 w-6 rounded skeleton-shimmer"></div>
<div class="h-2 w-6 rounded skeleton-shimmer"></div>
<div class="h-2 w-6 rounded skeleton-shimmer"></div>
<div class="h-2 w-6 rounded skeleton-shimmer"></div>
<div class="h-2 w-6 rounded skeleton-shimmer"></div>
<div class="h-2 w-6 rounded skeleton-shimmer"></div>
</div>
</div>

<div class="flex items-center justify-between mb-4">
<div class="h-6 w-32 rounded skeleton-shimmer"></div>
<div class="h-4 w-16 rounded skeleton-shimmer"></div>
</div>
<div class="space-y-4">
<!-- List Item 1 -->
<div class="flex items-center gap-4 p-3 rounded-lg bg-white dark:bg-slate-900 border border-slate-100 dark:border-slate-800">
<div class="size-12 rounded-full skeleton-shimmer"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-32 rounded skeleton-shimmer"></div>
<div class="h-3 w-20 rounded skeleton-shimmer"></div>
</div>
<div class="h-5 w-16 rounded skeleton-shimmer"></div>
</div>

<div class="size-12 rounded-full skeleton-shimmer"></div>
<div class="flex-1 space-y-2">
<div class="h-4 w-40 rounded skeleton-shimmer"></div>
<div class="h-3 w-24 rounded skeleton-shimmer"></div>
</div>
<div class="h-5 w-12 rounded skeleton-shimmer"></div>

</div>

<nav class="fixed bottom-0 left-0 right-0 bg-white/90 dark:bg-slate-950/90 backdrop-blur-lg border-t border-slate-200 dark:border-slate-800 px-6 py-3 flex justify-between items-center z-20 pb-8">
<button class="flex flex-col items-center gap-1 text-primary">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1">home</span>
<span class="text-[10px] font-semibold">Home</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">

</button>
<div class="relative -top-6">
<button class="size-14 rounded-full bg-primary text-white shadow-lg shadow-primary/30 flex items-center justify-center">
<span class="material-symbols-outlined text-3xl">add</span>
</button>
</div>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">

<span class="text-[10px] font-medium">Items</span>
</button>
<button class="flex flex-col items-center gap-1 text-slate-400 dark:text-slate-500">

</nav>
<!-- iOS Home Indicator -->
<div class="fixed bottom-1 left-1/2 -translate-x-1/2 w-32 h-1.5 bg-slate-300 dark:bg-slate-700 rounded-full z-30"></div>

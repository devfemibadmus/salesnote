# @format

name: salesnote
description: "A new Flutter project."
publish_to: "none"

version: 1.0.0+16

environment:
    sdk: ^3.10.8

dependencies:
    flutter:
        sdk: flutter
    flutter_timezone: ^5.0.1
    cupertino_icons: ^1.0.8
    intl: ^0.20.2
    hive: ^2.2.3
    shared_preferences: ^2.5.4
    http: ^1.6.0
    hive_flutter: ^1.1.0
    firebase_core: ^4.4.0
    firebase_messaging: ^16.1.1
    flutter_local_notifications: ^20.0.0
    device_info_plus: ^12.3.0
    phone_number: ^2.1.0
    country_picker: ^2.0.27
    package_info_plus: ^9.0.0
    image_picker: ^1.1.2
    pdf: ^3.11.1
    printing: ^5.14.2
    path_provider: ^2.1.5
    share_plus: ^10.1.2
    file_saver: ^0.3.1
    saver_gallery: ^4.1.0
    url_launcher: ^6.3.2
    flutter_secure_storage: ^10.0.0
    audio_session: ^0.2.1
    record: ^6.2.0
    flutter_sound: ^9.30.0

dev_dependencies:
    flutter_test:
        sdk: flutter
    integration_test:
        sdk: flutter

    flutter_lints: ^6.0.0
    image: ^4.5.4

flutter:
    uses-material-design: true
    assets:
        - assets/fonts/segoeui.ttf
        - assets/fonts/NotoSans-Regular.ttf
        - assets/fonts/NotoSans-Bold.ttf

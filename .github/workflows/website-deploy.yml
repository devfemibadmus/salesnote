# @format

name: SalesNote Website Deploy

on:
    push:
        branches:
            - website
    workflow_dispatch:

jobs:
    deploy-website:
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Test SSH connection
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      echo "SSH connection successful on $(hostname)"
                      sudo mkdir -p /home/salesnote/website
                      sudo chown -R "$(whoami):$(id -gn)" /home/salesnote/website

            - name: Upload website source
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  source: "backend/website"
                  target: "/home/salesnote/website/"
                  strip_components: 2
                  overwrite: true

            - name: Deploy website
              uses: appleboy/ssh-action@master
              env:
                  NGINX_WEBSITE_NAME: ${{ secrets.NGINX_WEBSITE_NAME }}
                  WEBSITE_APP_DOWNLOAD_URL: ${{ secrets.WEBSITE_APP_DOWNLOAD_URL }}
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  envs: NGINX_WEBSITE_NAME,WEBSITE_APP_DOWNLOAD_URL
                  script: |
                      set -e
                      if [ -z "$NGINX_WEBSITE_NAME" ]; then
                        echo "Missing NGINX_WEBSITE_NAME secret."
                        exit 1
                      fi

                      WEBSITE_SRC="/home/salesnote/website"
                      WEBSITE_ROOT="/var/www/salesnote-site"
                      WEBSITE_SITE="/etc/nginx/sites-available/salesnote-website"
                      WEBSITE_ENABLED="/etc/nginx/sites-enabled/salesnote-website"
                      WEBSITE_HTTP_TEMPLATE="${WEBSITE_SRC}/nginx.http.conf.template"
                      WEBSITE_HTTPS_TEMPLATE="${WEBSITE_SRC}/nginx.https.conf.template"
                      DOWNLOAD_URL="${WEBSITE_APP_DOWNLOAD_URL:-https://play.google.com/store/apps/details?id=com.blackstackhub.salesnote}"

                      sudo rm -rf "$WEBSITE_ROOT"
                      sudo mkdir -p "$WEBSITE_ROOT"

                      while IFS= read -r -d '' source_path; do
                        rel_path="${source_path#${WEBSITE_SRC}/}"
                        dest_path="${WEBSITE_ROOT}/${rel_path}"
                        sudo mkdir -p "$(dirname "$dest_path")"

                        case "$source_path" in
                          *.conf.template)
                            ;;
                          *.html|*.txt|*.xml)
                            WEBSITE_NAME="$NGINX_WEBSITE_NAME" APP_DOWNLOAD_URL="$DOWNLOAD_URL" \
                              perl -0pe 's/\{\{WEBSITE_NAME\}\}/$ENV{WEBSITE_NAME}/g; s/\{\{APP_DOWNLOAD_URL\}\}/$ENV{APP_DOWNLOAD_URL}/g' \
                              "$source_path" | sudo tee "$dest_path" >/dev/null
                            ;;
                          *)
                            sudo cp "$source_path" "$dest_path"
                            ;;
                        esac
                      done < <(find "$WEBSITE_SRC" -type f -print0)

                      WEBSITE_SSL_CERT="/etc/letsencrypt/live/${NGINX_WEBSITE_NAME}/fullchain.pem"
                      WEBSITE_SSL_KEY="/etc/letsencrypt/live/${NGINX_WEBSITE_NAME}/privkey.pem"

                      if sudo test -f "$WEBSITE_SSL_CERT" && sudo test -f "$WEBSITE_SSL_KEY"; then
                        WEBSITE_NAME="$NGINX_WEBSITE_NAME" WEBSITE_ROOT="$WEBSITE_ROOT" WEBSITE_SSL_CERT="$WEBSITE_SSL_CERT" WEBSITE_SSL_KEY="$WEBSITE_SSL_KEY" \
                          perl -0pe 's/\{\{WEBSITE_NAME\}\}/$ENV{WEBSITE_NAME}/g; s/\{\{WEBSITE_ROOT\}\}/$ENV{WEBSITE_ROOT}/g; s/\{\{WEBSITE_SSL_CERT\}\}/$ENV{WEBSITE_SSL_CERT}/g; s/\{\{WEBSITE_SSL_KEY\}\}/$ENV{WEBSITE_SSL_KEY}/g' \
                          "$WEBSITE_HTTPS_TEMPLATE" | sudo tee "$WEBSITE_SITE" >/dev/null
                      else
                        WEBSITE_NAME="$NGINX_WEBSITE_NAME" WEBSITE_ROOT="$WEBSITE_ROOT" \
                          perl -0pe 's/\{\{WEBSITE_NAME\}\}/$ENV{WEBSITE_NAME}/g; s/\{\{WEBSITE_ROOT\}\}/$ENV{WEBSITE_ROOT}/g' \
                          "$WEBSITE_HTTP_TEMPLATE" | sudo tee "$WEBSITE_SITE" >/dev/null
                      fi

                      sudo ln -sf "$WEBSITE_SITE" "$WEBSITE_ENABLED"
                      sudo nginx -t
                      sudo systemctl reload nginx

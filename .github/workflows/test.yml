# @format

name: SalesNote API Deploy

on:
    push:
        branches:
            - test
    workflow_dispatch:
        inputs:
            deploy_to_backend:
                description: "Deploy to backend server"
                required: true
                default: "true"
                type: boolean
            instance_count:
                description: "Number of API instances"
                required: true
                default: "2"
                type: string

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        env:
            API_INSTANCE_COUNT: ${{ github.event.inputs.instance_count || '2' }}
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Test SSH connection
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      echo "SSH connection successful on $(hostname)"

            - name: Restart service
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      set -e
                      chmod +x "/home/salesnote/api"
                      chmod +x "/home/salesnote/manage.sh"
                      sudo bash /home/salesnote/manage.sh scale "${{ env.API_INSTANCE_COUNT }}"
                      echo "Deployment complete!"

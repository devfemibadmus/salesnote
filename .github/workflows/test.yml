# @format

name: SalesNote k6 Load Test

on:
    push:
        branches:
            - test
    workflow_dispatch:
        inputs:
            script:
                description: "k6 script to run"
                required: true
                default: "sales-create.js"
                type: choice
                options:
                    - login-only.js
                    - home-gets.js
                    - sales-list.js
                    - item-list.js
                    - sales-create.js

jobs:
    run-k6:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup k6
              uses: grafana/setup-k6-action@v1

            - name: Restore local k6 config
              env:
                  K6_LOCAL_CONFIG_B64: ${{ secrets.K6_LOCAL_CONFIG_B64 }}
              run: |
                  if [ -z "$K6_LOCAL_CONFIG_B64" ]; then
                    echo "Missing repository secret: K6_LOCAL_CONFIG_B64"
                    exit 1
                  fi
                  printf '%s' "$K6_LOCAL_CONFIG_B64" | base64 -d > backend/k6/local.config.js

            - name: Run selected k6 script
              run: |
                  k6 run "backend/k6/${{ github.event.inputs.script }}" | tee k6-output.txt

# @format

name: SalesNote k6 Load Test

on:
    workflow_dispatch:
        inputs:
            script:
                description: "k6 script to run"
                required: true
                default: "sales-create.js"
                type: choice
                options:
                    - login-only.js
                    - home-gets.js
                    - sales-list.js
                    - item-list.js
                    - sales-create.js
            local_config_js:
                description: "Paste full backend/k6/local.config.js content"
                required: false
                default: ""
                type: string

jobs:
    run-k6:
        runs-on: ubuntu-22.04
        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup k6
              uses: grafana/setup-k6-action@v1

            - name: Restore local k6 config
              env:
                  K6_LOCAL_CONFIG_B64: ${{ secrets.K6_LOCAL_CONFIG_B64 }}
                  INPUT_LOCAL_CONFIG_JS: ${{ github.event.inputs.local_config_js }}
              run: |
                  if [ -n "$INPUT_LOCAL_CONFIG_JS" ]; then
                    printf '%s' "$INPUT_LOCAL_CONFIG_JS" > backend/k6/local.config.js
                    exit 0
                  fi

                  if [ -n "$K6_LOCAL_CONFIG_B64" ]; then
                    printf '%s' "$K6_LOCAL_CONFIG_B64" | base64 -d > backend/k6/local.config.js
                    exit 0
                  fi

                  echo "Missing local config. Paste local_config_js or set K6_LOCAL_CONFIG_B64 secret."
                  exit 1

            - name: Run selected k6 script
              run: |
                  SCRIPT="${{ github.event.inputs.script }}"
                  if [ -z "$SCRIPT" ]; then
                    SCRIPT="sales-create.js"
                  fi
                  k6 run "backend/k6/$SCRIPT"

# @format

name: SalesNote API Deploy

on:
    push:
        branches:
            - api
    workflow_dispatch:
        inputs:
            deploy_to_backend:
                description: "Deploy to backend server"
                required: true
                default: "true"
                type: boolean

jobs:
    build-and-deploy:
        runs-on: ubuntu-22.04
        env:
            API_DIR: /home/salesnote/api
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Test SSH connection
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      echo "SSH connection successful on $(hostname)"

            - name: Setup Rust
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  override: true

            - name: Cache dependencies
              uses: actions/cache@v3
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Build release binary
              run: cargo build --release --bin api
              working-directory: backend

            - name: Stop service before upload
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      sudo mkdir -p "${{ env.API_DIR }}"
                      sudo chown -R "${USER}:${USER}" "${{ env.API_DIR }}"
                      if [ -f "${{ env.API_DIR }}/manage.sh" ]; then
                        sudo bash "${{ env.API_DIR }}/manage.sh" stop || true
                      else
                        sudo systemctl stop 'salesnote@*' || true
                      fi

            - name: Write API env file
              uses: appleboy/ssh-action@master
              env:
                  API_ENV_FILE: ${{ secrets.API_ENV_FILE }}
                  API_ENV_FILE_B64: ${{ secrets.API_ENV_FILE_B64 }}
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  envs: API_ENV_FILE,API_ENV_FILE_B64
                  script: |
                      mkdir -p "${{ env.API_DIR }}"
                      if [ -n "$API_ENV_FILE_B64" ]; then
                        printf '%s' "$API_ENV_FILE_B64" | base64 -d > "${{ env.API_DIR }}/.env"
                      elif [ -n "$API_ENV_FILE" ]; then
                        printf '%s' "$API_ENV_FILE" > "${{ env.API_DIR }}/.env"
                      else
                        echo "Missing API env secret. Set API_ENV_FILE or API_ENV_FILE_B64."
                        exit 1
                      fi

            - name: Upload binary
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  source: "backend/target/release/api"
                  target: "${{ env.API_DIR }}/.deploy/"
                  strip_components: 3
                  overwrite: true

            - name: Upload deployment assets
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  source: "backend/manage.sh,backend/nginx.conf,backend/nginx.conf.template,backend/salesnote@.service,backend/salesnote.service"
                  target: "${{ env.API_DIR }}/"
                  strip_components: 1
                  overwrite: true

            - name: Write Firebase admin SDK file
              uses: appleboy/ssh-action@master
              env:
                  API_FIREBASE_ADMINSDK_JSON: ${{ secrets.API_FIREBASE_ADMINSDK_JSON }}
                  API_FIREBASE_ADMINSDK_JSON_B64: ${{ secrets.API_FIREBASE_ADMINSDK_JSON_B64 }}
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  envs: API_FIREBASE_ADMINSDK_JSON,API_FIREBASE_ADMINSDK_JSON_B64
                  script: |
                      mkdir -p "${{ env.API_DIR }}"
                      if [ -n "$API_FIREBASE_ADMINSDK_JSON_B64" ]; then
                        printf '%s' "$API_FIREBASE_ADMINSDK_JSON_B64" | base64 -d > "${{ env.API_DIR }}/firebase-adminsdk.json"
                      elif [ -n "$API_FIREBASE_ADMINSDK_JSON" ]; then
                        printf '%s' "$API_FIREBASE_ADMINSDK_JSON" > "${{ env.API_DIR }}/firebase-adminsdk.json"
                      else
                        echo "Missing Firebase admin SDK secret. Set API_FIREBASE_ADMINSDK_JSON or API_FIREBASE_ADMINSDK_JSON_B64."
                        exit 1
                      fi

            - name: Upload SSL certs (if provided)
              uses: appleboy/ssh-action@master
              if: contains(github.event.head_commit.message, 'SSL')
              env:
                  SSL_CERT_B64: ${{ secrets.SSL_CERT_B64 }}
                  SSL_KEY_B64: ${{ secrets.SSL_KEY_B64 }}
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  envs: SSL_CERT_B64,SSL_KEY_B64
                  script: |
                      if [ -n "$SSL_CERT_B64" ] && [ -n "$SSL_KEY_B64" ]; then
                        DOMAIN=$(grep -E '^NGINX_SERVER_NAME=' "${{ env.API_DIR }}/.env" | cut -d'=' -f2- | tr -d '\r')
                        if [ -z "$DOMAIN" ]; then
                          echo "NGINX_SERVER_NAME not set in ${{ env.API_DIR }}/.env"
                          exit 1
                        fi
                        sudo mkdir -p "/etc/letsencrypt/live/$DOMAIN"
                        echo "$SSL_CERT_B64" | base64 -d | sudo tee "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" >/dev/null
                        echo "$SSL_KEY_B64" | base64 -d | sudo tee "/etc/letsencrypt/live/$DOMAIN/privkey.pem" >/dev/null
                        sudo chmod 600 "/etc/letsencrypt/live/$DOMAIN/privkey.pem"
                      else
                        echo "SSL cert secrets not provided; skipping SSL upload."
                      fi

            - name: Upload email templates
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  source: "backend/src/api/email/templates/*"
                  target: "/home/salesnote/api/templates/email/"
                  strip_components: 5
                  overwrite: true

            - name: Restart service
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      set -e
                      if [ -f "${{ env.API_DIR }}/manage.sh" ]; then
                        sudo bash "${{ env.API_DIR }}/manage.sh" stop || true
                      else
                        sudo systemctl stop 'salesnote@*' || true
                      fi
                      test -f "${{ env.API_DIR }}/.deploy/api"
                      test -f "/home/salesnote/api/templates/email/logo.jpg"
                      sudo install -m 755 "${{ env.API_DIR }}/.deploy/api" "${{ env.API_DIR }}/api"
                      sudo chmod +x "${{ env.API_DIR }}/api"
                      sudo chmod +x "${{ env.API_DIR }}/manage.sh"
                      sudo bash "${{ env.API_DIR }}/manage.sh" start
                      echo "Deployment complete!"

# @format

name: SalesNote API Deploy

on:
    push:
        branches:
            - api
    workflow_dispatch:
        inputs:
            deploy_to_backend:
                description: "Deploy to backend server"
                required: true
                default: "true"
                type: boolean
            instance_count:
                description: "Number of API instances"
                required: true
                default: "2"
                type: string

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Setup Rust
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  override: true

            - name: Cache dependencies
              uses: actions/cache@v3
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Run tests
              run: cargo test
              working-directory: backend

            - name: Build release binary
              run: cargo build --release --bin api
              working-directory: backend

            - name: Stop service before upload
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      sudo systemctl stop 'salesnote@*' || true

            - name: Upload binary to VPS
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  source: "backend/target/release/api"
                  target: "/home/salesnote/"
                  overwrite: true

            - name: Upload deployment assets
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  source: |
                      backend/manage.sh
                      backend/nginx.conf
                      backend/nginx.conf.template
                      backend/salesnote@.service
                      backend/salesnote.service
                      backend/firebase-adminsdk.json
                  target: "/home/salesnote/"
                  overwrite: true

            - name: Upload SSL certs (if provided)
              uses: appleboy/ssh-action@master
              if: contains(github.event.head_commit.message, 'SSL')
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  envs: SSL_CERT_B64,SSL_KEY_B64
                  script: |
                      if [ -n "$SSL_CERT_B64" ] && [ -n "$SSL_KEY_B64" ]; then
                        DOMAIN=$(grep -E '^NGINX_SERVER_NAME=' /home/salesnote/.env | cut -d'=' -f2- | tr -d '\r')
                        if [ -z "$DOMAIN" ]; then
                          echo "NGINX_SERVER_NAME not set in /home/salesnote/.env"
                          exit 1
                        fi
                        sudo mkdir -p "/etc/letsencrypt/live/$DOMAIN"
                        echo "$SSL_CERT_B64" | base64 -d | sudo tee "/etc/letsencrypt/live/$DOMAIN/fullchain.pem" >/dev/null
                        echo "$SSL_KEY_B64" | base64 -d | sudo tee "/etc/letsencrypt/live/$DOMAIN/privkey.pem" >/dev/null
                        sudo chmod 600 "/etc/letsencrypt/live/$DOMAIN/privkey.pem"
                      else
                        echo "SSL cert secrets not provided; skipping SSL upload."
                      fi

            - name: Restart service on VPS
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      chmod +x "/home/salesnote/api"
                      chmod +x "/home/salesnote/manage.sh"
                      sudo bash /home/salesnote/manage.sh scale ${{ inputs.instance_count }}
                      echo "Deployment complete!"

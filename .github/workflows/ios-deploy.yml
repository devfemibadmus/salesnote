# @format

name: SalesNote iOS Build and Deploy

on:
    push:
        branches:
            - ios
    workflow_dispatch:
        inputs:
            deploy_to_testflight:
                description: "Deploy to TestFlight"
                required: true
                default: "true"
                type: boolean

jobs:
    build-and-deploy-ios:
        runs-on: macos-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: List available Xcode versions
              run: ls /Applications | grep Xcode

            - name: Select latest Xcode
              run: |
                  sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer || \
                  sudo xcode-select -s /Applications/Xcode_26.1.1.app/Contents/Developer || \
                  sudo xcode-select -s /Applications/Xcode_26.app/Contents/Developer
                  xcodebuild -version
                  xcodebuild -showsdks | grep iOS

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.41.3"
                  channel: "stable"
                  cache: true

            - name: Install dependencies
              run: |
                  cd mobile
                  flutter pub get
                  cd ios
                  pod repo update
                  rm -rf Pods Podfile.lock
                  pod install

            - name: Restore GoogleService-Info.plist
              env:
                  IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64: ${{ secrets.IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64 }}
              run: |
                  echo -n "$IOS_GOOGLE_SERVICE_INFO_PLIST_BASE64" | base64 --decode -o mobile/ios/Runner/GoogleService-Info.plist

            - name: Create ExportOptions.plist
              env:
                  APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
              run: |
                  cat > mobile/ios/ExportOptions.plist <<EOF
                  <?xml version="1.0" encoding="UTF-8"?>
                  <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
                  <plist version="1.0">
                  <dict>
                      <key>method</key>
                      <string>app-store</string>
                      <key>signingStyle</key>
                      <string>manual</string>
                      <key>uploadBitcode</key>
                      <false/>
                      <key>uploadSymbols</key>
                      <true/>
                      <key>compileBitcode</key>
                      <false/>
                      <key>teamID</key>
                      <string>NB8QPVZ6PA</string>
                      <key>provisioningProfiles</key>
                      <dict>
                          <key>com.blackstackhub.salesnote</key>
                          <string>${APPLE_PROVISIONING_PROFILE_NAME}</string>
                      </dict>
                      <key>signingCertificate</key>
                      <string>Apple Distribution</string>
                  </dict>
                  </plist>
                  EOF

            - name: Install Apple Certificate and Provisioning Profile
              env:
                  BUILD_CERTIFICATE_BASE64: ${{ secrets.BUILD_CERTIFICATE_BASE64 }}
                  P12_PASSWORD: ${{ secrets.P12_PASSWORD }}
                  BUILD_PROVISION_PROFILE_BASE64: ${{ secrets.BUILD_PROVISION_PROFILE_BASE64 }}
                  KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
              run: |
                  # Create variables
                  CERTIFICATE_PATH=$RUNNER_TEMP/build_certificate.p12
                  PP_PATH=$RUNNER_TEMP/build_pp.mobileprovision
                  KEYCHAIN_PATH=$RUNNER_TEMP/app-signing.keychain-db

                  # Import certificate and provisioning profile from secrets
                  echo -n "$BUILD_CERTIFICATE_BASE64" | base64 --decode -o $CERTIFICATE_PATH
                  echo -n "$BUILD_PROVISION_PROFILE_BASE64" | base64 --decode -o $PP_PATH

                  # Create temporary keychain
                  security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
                  security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
                  security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

                  # Import certificate to keychain
                  security import $CERTIFICATE_PATH -P "$P12_PASSWORD" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
                  security list-keychain -d user -s $KEYCHAIN_PATH
                  security default-keychain -s $KEYCHAIN_PATH
                  security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH

                  # Apply provisioning profile
                  mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
                  PP_UUID=$(grep -a -A1 'UUID' $PP_PATH | grep string | sed -e 's/<string>//' -e 's/<\/string>//' | tr -d '\t ')
                  cp $PP_PATH ~/Library/MobileDevice/Provisioning\ Profiles/$PP_UUID.mobileprovision
                  echo "PP_UUID=$PP_UUID" >> $GITHUB_ENV

                  # Extract signing identity
                  CERTIFICATE_NAME=$(security find-identity -v -p codesigning $KEYCHAIN_PATH | head -1 | grep '"' | sed -e 's/[^"]*"//' -e 's/".*//') 
                  echo "CERTIFICATE_NAME=$CERTIFICATE_NAME" >> $GITHUB_ENV

            - name: Debug signing assets
              run: |
                  echo "Keychains:"
                  security list-keychain -d user
                  echo "Signing identities:"
                  security find-identity -v -p codesigning $RUNNER_TEMP/app-signing.keychain-db || true
                  echo "Provisioning profiles:"
                  ls -la ~/Library/MobileDevice/Provisioning\ Profiles || true

            - name: Build iOS app
              env:
                  APPLE_PROVISIONING_PROFILE_NAME: ${{ secrets.APPLE_PROVISIONING_PROFILE_NAME }}
              run: |
                  # Clean previous builds
                  cd mobile
                  flutter clean
                  flutter pub get
                  # Build iOS artifacts without signing
                  flutter build ios --release --no-codesign

                  # Archive and sign with the distribution cert/profile
                  xcodebuild -workspace ios/Runner.xcworkspace \
                    -scheme Runner \
                    -configuration Release \
                    -archivePath build/ios/archive/Runner.xcarchive \
                    CODE_SIGN_STYLE=Manual \
                    CODE_SIGN_IDENTITY="Apple Distribution" \
                    DEVELOPMENT_TEAM=NB8QPVZ6PA \
                    PROVISIONING_PROFILE_SPECIFIER="$APPLE_PROVISIONING_PROFILE_NAME" \
                    PRODUCT_BUNDLE_IDENTIFIER=com.blackstackhub.salesnote \
                    OTHER_CODE_SIGN_FLAGS="--keychain $RUNNER_TEMP/app-signing.keychain-db" \
                    archive

                  # Export IPA
                  xcodebuild -exportArchive \
                    -archivePath build/ios/archive/Runner.xcarchive \
                    -exportOptionsPlist ios/ExportOptions.plist \
                    -exportPath build/ios/ipa

            - name: Upload to TestFlight
              if: github.event_name == 'push' || github.event.inputs.deploy_to_testflight == 'true'
              env:
                  APP_STORE_CONNECT_API_KEY_ID: ${{ secrets.APP_STORE_CONNECT_API_KEY_ID }}
                  APP_STORE_CONNECT_ISSUER_ID: ${{ secrets.APP_STORE_CONNECT_ISSUER_ID }}
                  APP_STORE_CONNECT_API_KEY_BASE64: ${{ secrets.APP_STORE_CONNECT_API_KEY_BASE64 }}
              run: |
                  cd mobile
                  # Create private_keys directory in expected location
                  mkdir -p ~/.appstoreconnect/private_keys

                  # Save API key with correct filename
                  echo -n "$APP_STORE_CONNECT_API_KEY_BASE64" | base64 --decode -o ~/.appstoreconnect/private_keys/AuthKey_$APP_STORE_CONNECT_API_KEY_ID.p8

                  # Upload to TestFlight
                  xcrun altool --upload-app \
                    --type ios \
                    --file build/ios/ipa/*.ipa \
                    --apiKey $APP_STORE_CONNECT_API_KEY_ID \
                    --apiIssuer $APP_STORE_CONNECT_ISSUER_ID

            - name: Clean up keychain and provisioning profile
              if: always()
              run: |
                  security delete-keychain $RUNNER_TEMP/app-signing.keychain-db || true
                  rm -rf ~/Library/MobileDevice/Provisioning\ Profiles || true

# @format

name: SalesNote Android Build and Deploy

on:
    push:
        branches:
            - android
    workflow_dispatch:
        inputs:
            deploy_to_playstore:
                description: "Deploy to Play Store Internal Testing"
                required: true
                default: "true"
                type: boolean

jobs:
    build-and-deploy-android:
        runs-on: ubuntu-latest
        defaults:
            run:
                working-directory: mobile

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Java
              uses: actions/setup-java@v4
              with:
                  distribution: "temurin"
                  java-version: "17"
                  cache: "gradle"

            - name: Set up Flutter
              uses: subosito/flutter-action@v2
              with:
                  flutter-version: "3.41.3"
                  channel: "stable"
                  cache: true

            - name: Install dependencies
              run: flutter pub get

            - name: Restore google-services.json
              env:
                  ANDROID_GOOGLE_SERVICES_JSON: ${{ secrets.ANDROID_GOOGLE_SERVICES_JSON }}
              run: |
                  if [ -n "$ANDROID_GOOGLE_SERVICES_JSON" ]; then
                    printf '%s' "$ANDROID_GOOGLE_SERVICES_JSON" > android/app/google-services.json
                  else
                    echo "Missing Android Firebase config secret."
                    exit 1
                  fi

            - name: Decode Keystore
              env:
                  ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
              run: |
                  echo "$ANDROID_KEYSTORE_BASE64" | base64 --decode > android/app/salesnote-upload.jks

            - name: Create key.properties
              env:
                  ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
                  ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
                  ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
              run: |
                  cat > android/key.properties <<EOF
                  storePassword=$ANDROID_KEYSTORE_PASSWORD
                  keyPassword=$ANDROID_KEY_PASSWORD
                  keyAlias=$ANDROID_KEY_ALIAS
                  storeFile=salesnote-upload.jks
                  EOF

            - name: Build Android App Bundle
              run: |
                  flutter clean
                  flutter pub get
                  flutter build appbundle --release

            - name: Upload to Google Play Store
              if: github.event_name == 'push' || github.event.inputs.deploy_to_playstore == 'true'
              uses: r0adkll/upload-google-play@v1.1.3
              with:
                  serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
                  packageName: com.blackstackhub.salesnote
                  releaseFiles: mobile/build/app/outputs/bundle/release/app-release.aab
                  track: internal
                  status: completed
                  inAppUpdatePriority: 2

            - name: Clean up
              if: always()
              run: |
                  rm -f android/app/salesnote-upload.jks
                  rm -f android/app/google-services.json
                  rm -f android/key.properties

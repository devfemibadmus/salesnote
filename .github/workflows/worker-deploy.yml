# @format

name: Salesnote Worker Deploy

on:
    push:
        branches:
            - worker
    workflow_dispatch:
        inputs:
            deploy_to_worker:
                description: "Deploy to worker server"
                required: true
                default: "true"
                type: boolean

jobs:
    build-and-deploy:
        runs-on: ubuntu-latest
        steps:
            - name: Checkout code
              uses: actions/checkout@v3

            - name: Test SSH connection
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      echo "SSH connection successful on $(hostname)"

            - name: Setup Rust
              uses: actions-rs/toolchain@v1
              with:
                  toolchain: stable
                  override: true

            - name: Cache dependencies
              uses: actions/cache@v3
              with:
                  path: |
                      ~/.cargo/registry
                      ~/.cargo/git
                      target
                  key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

            - name: Build worker binary
              run: cargo build --release --bin worker
              working-directory: backend

            - name: Stop worker service before upload
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      set -e
                      sudo systemctl stop salesnoteworker || true
                      sudo mkdir -p /home/salesnote/worker
                      sudo mkdir -p /home/salesnote/worker/templates/email
                      sudo chown -R "${USER}:${USER}" /home/salesnote/worker

            - name: Upload worker binary
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  source: "backend/target/release/worker"
                  target: "/home/salesnote/worker/"
                  strip_components: 3
                  overwrite: true

            - name: Upload worker service file
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  source: "backend/salesnoteworker.service"
                  target: "/home/salesnote/worker/"
                  strip_components: 1
                  overwrite: true

            - name: Upload worker email templates
              uses: appleboy/scp-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  source: "backend/src/worker/email/templates/*"
                  target: "/home/salesnote/worker/templates/email/"
                  strip_components: 5
                  overwrite: true

            - name: Write worker env file
              uses: appleboy/ssh-action@master
              env:
                  API_ENV_FILE: ${{ secrets.API_ENV_FILE }}
                  API_ENV_FILE_B64: ${{ secrets.API_ENV_FILE_B64 }}
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  envs: API_ENV_FILE,API_ENV_FILE_B64
                  script: |
                      set -e
                      if [ -n "$API_ENV_FILE_B64" ]; then
                        printf '%s' "$API_ENV_FILE_B64" | base64 -d > /home/salesnote/worker/.env
                      elif [ -n "$API_ENV_FILE" ]; then
                        printf '%s' "$API_ENV_FILE" > /home/salesnote/worker/.env
                      else
                        echo "Missing API env secret. Set API_ENV_FILE or API_ENV_FILE_B64."
                        exit 1
                      fi

            - name: Write worker Firebase admin SDK file
              uses: appleboy/ssh-action@master
              env:
                  API_FIREBASE_ADMINSDK_JSON: ${{ secrets.API_FIREBASE_ADMINSDK_JSON }}
                  API_FIREBASE_ADMINSDK_JSON_B64: ${{ secrets.API_FIREBASE_ADMINSDK_JSON_B64 }}
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  envs: API_FIREBASE_ADMINSDK_JSON,API_FIREBASE_ADMINSDK_JSON_B64
                  script: |
                      set -e
                      if [ -n "$API_FIREBASE_ADMINSDK_JSON_B64" ]; then
                        printf '%s' "$API_FIREBASE_ADMINSDK_JSON_B64" | base64 -d > /home/salesnote/worker/firebase-adminsdk.json
                      elif [ -n "$API_FIREBASE_ADMINSDK_JSON" ]; then
                        printf '%s' "$API_FIREBASE_ADMINSDK_JSON" > /home/salesnote/worker/firebase-adminsdk.json
                      else
                        echo "Missing API Firebase admin SDK secret. Set API_FIREBASE_ADMINSDK_JSON or API_FIREBASE_ADMINSDK_JSON_B64."
                        exit 1
                      fi

            - name: Register and start worker
              uses: appleboy/ssh-action@master
              with:
                  host: ${{ secrets.API_SSH_HOST }}
                  username: ${{ secrets.API_SSH_USER }}
                  key: ${{ secrets.API_SSH_KEY }}
                  script: |
                      set -e
                      test -f "/home/salesnote/worker/worker"
                      test -f "/home/salesnote/worker/.env"
                      test -f "/home/salesnote/worker/firebase-adminsdk.json"
                      test -f "/home/salesnote/worker/salesnoteworker.service"
                      test -f "/home/salesnote/worker/templates/email/password-reset.html"
                      test -f "/home/salesnote/worker/templates/email/welcome.html"
                      test -f "/home/salesnote/worker/templates/email/logo.jpg"
                      sudo chmod +x "/home/salesnote/worker/worker"
                      sudo install -m 644 /home/salesnote/worker/salesnoteworker.service /etc/systemd/system/salesnoteworker.service
                      sudo systemctl daemon-reload
                      sudo systemctl enable salesnoteworker
                      sudo systemctl restart salesnoteworker
                      echo "Worker deployment complete!"
